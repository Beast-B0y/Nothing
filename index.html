<body>

    <h1>Bienvenue sur Nothing</h1>
    <p class="p2">Cette page contient un compteur de clics et un chronomêtre pour déclancher le chronomêtre il suffit d'appuyer sur Démarer/Reprendre, <br>
         le compteur de clics se déclance tout seul. Bonne perte de temps.</p>

    <button id="clickButton" onclick="countClicks();">Perdre son temps</button>
<p>Nombre de clics : <span id="clickCount">0</span></p>
<p>Temps perdu : <span id="timer">  00:00:00</span></p>
<audio id="clickSound" src="boing.mp3"></audio>
<button class="button2" onclick="startTimer()">Démarer/Reprendre</button>
<button class="button1" onclick="pauseTimer()">Pause</button><br>
<button class="button3" onclick="location.reload()">Réinitialiser</button>

<script>
    let compteur = 0;
    const bouton = document.querySelector('#clickButton');

    bouton.addEventListener('click', function() {
        compteur++;
        document.getElementById('clickCount').textContent = compteur;

        if (compteur % 100 === 0) {
            alert("T'as vraiment appuyé " + compteur + " fois! T'as compris que le concept c'est d'avoir un bouton inutule ?");
        }    
    });
</script>

<script>
    let timerInterval;
    let seconds = 0;
    let minutes = 0;
    let hours = 0;
    let isPaused = false;

    function startTimer() {
        timerInterval = setInterval(updateTimer, 1000);
    }

    function pauseTimer() {
        clearInterval(timerInterval);
        isPaused = true;
    }

    function resumeTimer() {
        if (isPaused) {
            startTimer();
            isPaused = false;
        }
    }

    function updateTimer() {
        seconds++;
        if (seconds === 60) {
            seconds = 0;
            minutes++;
            if (minutes === 60) {
                minutes = 0;
                hours++;
            }
        }
        document.getElementById("timer").textContent = 
            (hours < 10 ? "0" + hours : hours) + ":" + 
            (minutes < 10 ? "0" + minutes : minutes) + ":" + 
            (seconds < 10 ? "0" + seconds : seconds);
    }
</script>

<script>
    var count = 0;

    function countClicks() {
        var sound = document.getElementById("clickSound");
        sound.play();
        count++;
        document.getElementById("clickCount").textContent = count;
    }
</script>

<script>
    function playSound() {
        var sound = document.getElementById("clickSound");
        sound.play();
    }
</script>



</body>

</html>
